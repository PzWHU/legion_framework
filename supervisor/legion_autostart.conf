[group:legion]
programs = setting,canbus,routing,prediction,planning,control,legion_bridge

[program:setting]
directory=/home/beacon/legion_framework/scripts
command=/bin/bash /home/beacon/legion_framework/scripts/handle_autostart.sh setting
autostart=true
autorestart=true
startsecs=5
startretries=1
stopasgroup=false
redirect_stderr=true
stdout_logfile=/home/beacon/legion_framework/supervisor_logs/setting.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
user=root
priority=1001
environment=
    HOME="/home/beacon",
    USER="beacon"

[program:discovery_server]
directory=/home/beacon/legion_framework/scripts
command=/bin/bash /home/beacon/legion_framework/scripts/handle_autostart.sh discovery_server
autostart=false
autorestart=true
startsecs=5
startretries=3
stopasgroup=true
redirect_stderr=true
stdout_logfile=/home/beacon/legion_framework/supervisor_logs/discovery_server.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
user=beacon
priority=1000
environment=
    HOME="/home/beacon",
    USER="beacon",
    ROS_DOMAIN_ID="0",
    DDS_IMPLEMENTATION="cyclonedds",
    RMW_IMPLEMENTATION="rmw_cyclonedds_cpp",
    RCL_ASSERT_RMW_ID_MATCHES="rmw_cyclonedds_cpp",
    CYCLONEDDS_URI="file:///home/beacon/legion_framework/config/ros_cyclonedds.xml",
    ROS_LOG_DIR="/home/beacon/.ros/log",
    CYCLONEDDS_URI="file:///home/beacon/legion_framework/config/ros_cyclonedds.xml"

