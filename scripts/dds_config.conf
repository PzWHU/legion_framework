# ================================================
# Legion Framework DDS 配置
# 用于统一管理系统中 CycloneDDS / FastDDS 的选择
# ================================================
#
# 使用说明：
#   1. 修改 DDS_TYPE 选择使用的 DDS 实现
#   2. 所有 scripts 目录下的脚本会自动读取此文件
#   3. 也可通过环境变量覆盖
#
# 可选值：
#   cyclonedds  - 使用 CycloneDDS (rmw_cyclonedds_cpp)，默认推荐
#   fastdds     - 使用 Fast-DDS  (rmw_fastrtps_cpp)
#
# 多机通信注意事项：
#   - CycloneDDS: 配合 config/ros_cyclonedds_*.xml 中 Peers 配置（带端口的单播地址）
#   - FastDDS:    配合 config/ros_fastdds.xml 中的 interfaceWhiteList 配置
#   - 多机环境下所有机器必须使用相同的 DDS 类型
#   - config/ros_cyclonedds.xml 是通用模板，实际使用由 load_dds_config.sh 根据本机 IP 自动选择 ros_cyclonedds_<IP>.xml
#
# ================================================

# DDS 实现类型
DDS_TYPE=fastdds

# ROS_DOMAIN_ID (可选，默认 0)
# 多组机器人或需要隔离时可设置不同值
# ROS_DOMAIN_ID=0

# 本机 IP 地址 (可选，脚本会自动检测)
# 格式：点分十进制，如 192.168.1.101
# MY_IP=192.168.1.101

# 本机网卡名称 (可选，自动检测)
# 格式：网卡名，如 eth0, enp0s3
# MY_INTERFACE=eth0

# ================================================
# 传输模式配置 (CycloneDDS & FastDDS 均支持)
# ================================================
#
# 控制本机进程间通信使用共享内存还是 UDP
# 可选值：
#   shm   - 强制全部使用共享内存 (跨机器通信也会尝试 SHM)
#           (CycloneDDS: CYCLONEDDS_TRANSPORT=shm)
#   udp   - 强制全部使用 UDP 网络通信
#           (CycloneDDS: CYCLONEDDS_TRANSPORT=udp)
#   auto  - 本机进程间用共享内存，跨机器自动降级为 UDP (默认)
#           (CycloneDDS: CYCLONEDDS_TRANSPORT=auto)
#
TRANSPORT_MODE=auto

# ================================================
# Discovery Server 配置 (可选，仅 FastDDS 使用)
# ================================================
# 格式：IP:PORT，多个用逗号分隔
# DISCOVERY_SERVER_PRIMARY=192.168.1.101:11811
# DISCOVERY_SERVER_BACKUP=192.168.1.102:11811
