# ================================================
# Zenoh Bridge ROS2DDS 配置文件
# Legion Framework - A 端 (192.168.1.101)
# ================================================
#
# 模式: peer-to-peer
# - A 端 (本机) 和 B 端 (192.168.1.102) 互相对等连接
# - C 端 (192.168.1.103) 已隔离，不连接
# - DDS Domain: 继承 ROS_DOMAIN_ID 环境变量
#
# Topic 过滤:
# - DDS → Zenoh：仅允许 /drivers/canbus/Chassis 外发
# - Zenoh → DDS：仅允许 /localization/global_fusion/Location 接收
#
# 使用方式:
#   zenoh-bridge-ros2dds --config /home/beacon/legion_framework/config/zenoh_bridge.conf
#   (由 handle_autostart.sh 根据本机 IP 自动选择配置文件)
#
# ================================================

mode = "peer"

# ----------------------------------------
# 连接配置: 主动连接对端
# ----------------------------------------
connect:
  endpoints:
    - "udp/192.168.1.102:7447"

# ----------------------------------------
# 监听配置: 监听本机 UDP 端口
# ----------------------------------------
listen:
  endpoints:
    - "udp/0.0.0.0:7447"

# ----------------------------------------
# 作用域配置
# ----------------------------------------
scouting:
  # 多播发现超时
  timeout: 10000  # ms
  # 多播TTL
  ttl: 1
  # 是否启用多播发现
  multicast:
    enabled: true
    join:
      - "udp/239.255.255.250:7447"

# ----------------------------------------
# 会话配置
# ----------------------------------------
# Zenoh 标识符 (32字符十六进制, 可选)
# id = "a0b1c2d3e4f567890123456789abcdef"

# ----------------------------------------
# 插件配置
# ----------------------------------------
plugins:
  ros2dds:
    # DDS Domain, 默认使用 ROS_DOMAIN_ID 环境变量
    # domain: 0

    # ROS namespace (可选)
    # namespace: ""

    # 本地localhost优先 (生产环境建议 false)
    ros_localhost_only: false

    # ================================================
    # Topic 白名单过滤
    # ================================================
    # allow = true:  白名单模式，只有匹配的话题被转发
    # allow = false: 黑名单模式，匹配的话题不转发

    # DDS → Zenoh：只允许 /drivers/canbus/Chassis 转发到网络
    topic_publications:
      - rule: "/drivers/canbus/Chassis"
        allow: true
        deny: false
      - rule: "/.*"
        allow: false
        deny: true

    # Zenoh → DDS：只允许从网络接收 /localization/global_fusion/Location
    topic_subscriptions:
      - rule: "/localization/global_fusion/Location"
        allow: true
        deny: false
      - rule: "/.*"
        allow: false
        deny: true

    # ================================================

    # 服务端过滤 (可选)
    # service_requests:
    #   - rule: "/.*"
    #     deny: false

    # 动作过滤 (可选)
    # action_requests:
    #   - rule: "/.*"
    #     deny: false

    # 话题 QoS 兼容性
    # use_compatible_qos: true

    # 是否转发参数
    # parameter_events: true

    # 租约时长 (s)
    # lease: 30

    # 心跳间隔 (s)
    # heartbeat: 10

# ----------------------------------------
# 传输层配置
# ----------------------------------------
transport:
  unicast:
    # 启用UDP
    enabled: true
    # 接受未加密连接
    accept_unencrypted: true
  # 多播
  multicast:
    enabled: true
    # 启用共享内存
    shm: true
