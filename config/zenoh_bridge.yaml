# ================================================
# Zenoh Bridge ROS2DDS 配置文件
# Legion Framework - A 端 (192.168.1.101)
# ================================================
#
# 模式: peer-to-peer
# - A 端 (本机) 和 B 端 (192.168.1.102) 互相对等连接
# - C 端 (192.168.1.103) 已隔离，不连接
# - DDS Domain: 继承 ROS_DOMAIN_ID 环境变量
#
# Topic 过滤:
# - DDS → Zenoh：仅允许 /drivers/canbus/Chassis 外发
# - Zenoh → DDS：仅允许 /localization/global_fusion/Location 接收
#
# ================================================

mode: "peer"

connect:
  endpoints:
    - "udp/192.168.1.102:7447"

listen:
  endpoints:
    - "udp/0.0.0.0:7447"

scouting:
  timeout: 10000
  multicast:
    enabled: true
    address: "224.0.0.224:7446"
    interface: "auto"
    listen: true

plugins:
  ros2dds:
    ros_localhost_only: false

    # ================================================
    # Topic 白名单过滤
    # allow:  白名单模式，只有匹配的话题被转发
    # deny:   黑名单模式，匹配的话题不转发
    # 只能同时使用 allow 或 deny，不能混用
    # ================================================

    # DDS → Zenoh：只允许 /drivers/canbus/Chassis 转发到网络
    # Zenoh → DDS：只允许从网络接收 /localization/global_fusion/Location
    allow:
      publishers: ["/drivers/canbus/Chassis"]
      subscribers: ["/localization/global_fusion/Location"]
      service_servers: []
      service_clients: []
      action_servers: []
      action_clients: []

    # ================================================

    # 服务端过滤 (可选)
    # service_requests:
    #   - rule: "/.*"
    #     deny: false

    # 动作过滤 (可选)
    # action_requests:
    #   - rule: "/.*"
    #     deny: false

    # 话题 QoS 兼容性
    # use_compatible_qos: true

    # 是否转发参数
    # parameter_events: true

    # 租约时长 (s)
    # lease: 30

    # 心跳间隔 (s)
    # heartbeat: 10
